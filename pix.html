<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento PIX</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div id="qrCodeContent" style="display:none;">
            <div id="qrcode"></div>
            <input type="text" id="qrCodeText" class="form-control" readonly>
            <button onclick="copiarCodigo()" class="btn btn-primary mt-2">Copiar Código</button>
        </div>
        <div id="formContent" style="display:block;">
            <h2>Pagamento PIX</h2>
            <div class="divOpcao d-none url-option d-block">
                <div class="box-pix input-group flex-column" id="tipo-chave-container">
                    <label class="pix-label" for="tipo-chave">Tipo de chave:<span class="ml-1" style="color:red">*</span></label>
                    <div class="form-group input-group-prepend">
                        <select class="input-form" id="tipo-chave" name="tipo-chave" data-required="true" required="">
                            <option value="cpf">CPF</option>
                            <option value="cnpj">CNPJ</option>
                            <option value="email">E-mail</option>
                            <option value="telefone">Telefone</option>
                            <option value="aleatoria">Chave aleatória</option>
                        </select>
                        <input id="valor-chave" name="valor-chave" class="input-form" aria-label="Text input with dropdown button" data-required="true" required="" autocomplete="off" value="11949726856">
                    </div>
                </div>
                <div class="form-group pix-container mt-3">
                    <div>
                        <div class="box-pix">
                            <div class="form-group">
                                <label class="pix-label" for="nome-beneficiario">Nome do beneficiário:<span class="ml-1" style="color:red">*</span></label>
                                <input id="nome-beneficiario" name="nome-beneficiario" class="input-form" data-required="true" required="" maxlength="25" value="Melczeldek H Wabes">
                            </div>
                        </div>
                    </div>
                    <div>
                        <div class="box-pix">
                            <div class="form-group">
                                <label class="pix-label" for="cidade-beneficiario">Cidade do beneficiário:<span class="ml-1" style="color:red">*</span></label>
                                <input id="cidade-beneficiario" name="cidade-beneficiario" class="input-form" data-required="true" required="" maxlength="15" value="São Paulo">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="box-pix">
                            <label class="pix-label" for="valor-transferencia">Valor da transferência:</label>
                            <div class="input-group valor-pix mb-3">
                                <div class="input-group-prepend">
                                    <span class="input-group-text" id="basic-addon1">R$</span>
                                </div>
                                <input id="valor-transferencia" name="valor-transferencia" class="input-form valores" placeholder="0,00" aria-label="transferencia" aria-describedby="basic-addon1" value="1.00">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="box-pix">
                            <div class="form-group">
                                <label class="pix-label" for="identificador-transacao">Identificador da transação:</label>
                                <input id="identificador-transacao" name="identificador-transacao" class="input-form" pattern="[A-Za-z0-9]+" title="O identificador não pode ter caracteres especiais nem espaços" maxlength="25" value="teste de codigo">
                                <p class="small mb-0 mt-1"><i>Sem espaços e/ou caracteres especiais (ex: ç ã)</i></p>
                            </div>
                        </div>
                    </div>
                </div>
                <button onclick="gerarPIX()" class="btn btn-primary mt-2">Gerar PIX</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/7.14.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/7.14.0/firebase-database.js"></script>

    <script>
        // Insira as configurações do Firebase aqui
        var firebaseConfig = {
            apiKey: "AIzaSyD9w-BMC-4WrQppa6VnOCrszo4QMIyROXU",
            authDomain: "euques-teste.firebaseapp.com",
            databaseURL: "https://euques-teste-default-rtdb.firebaseio.com",
            projectId: "euques-teste",
            storageBucket: "euques-teste.appspot.com",
            messagingSenderId: "48182046778",
            appId: "1:48182046778:web:4cd6f3b08cae7f6588c503",
            measurementId: "G-KQXMBG1EXG"
        };

        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);

        function gerarPIX() {
            var tipoChave = document.getElementById('tipo-chave').value;
            var valorChave = document.getElementById('valor-chave').value;
            var nomeBeneficiario = document.getElementById('nome-beneficiario').value;
            var cidadeBeneficiario = document.getElementById('cidade-beneficiario').value;
            var valorTransferencia = document.getElementById('valor-transferencia').value;
            var identificadorTransacao = document.getElementById('identificador-transacao').value;

            // Verifica se os campos obrigatórios estão preenchidos
            if (!tipoChave || !valorChave || !nomeBeneficiario || !cidadeBeneficiario || !valorTransferencia || !identificadorTransacao) {
                alert("Por favor, preencha todos os campos obrigatórios.");
                return;
            }

            // Monta a chave PIX com base nas informações fornecidas
            var chavePix = tipoChave.toUpperCase() + ":" + valorChave;

            // Monta o payload do PIX
            var payloadPix = {
                chave: chavePix,
                nome: nomeBeneficiario,
                cidade: cidadeBeneficiario,
                valor: parseFloat(valorTransferencia),
                id: identificadorTransacao
            };

            // Transforma o payload em uma string JSON
            var payloadPixString = JSON.stringify(payloadPix);

            // Obtém o valor da variável "c" da URL
            var url = new URL(window.location.href);
            var c = url.searchParams.get("c");

            // Define o caminho no Firebase com base em "c"
            var caminhoFirebase = 'eqr/' + c + '/valor';

            // Verifica se já existem dados no Firebase para o identificador de transação
            verificarExistenciaDadosFirebase(caminhoFirebase, payloadPixString);
        }

        function verificarExistenciaDadosFirebase(caminho, payloadPixString) {
            var database = firebase.database();
            var ref = database.ref(caminho);

            ref.once('value').then(function(snapshot) {
                var dadosFirebase = snapshot.val();

                if (dadosFirebase) {
                    // Já existem dados, exiba os dados existentes
                    exibirQRCode(dadosFirebase);
                } else {
                    // Não existem dados, salve os novos dados e exiba o QR Code
                    salvarDadosFirebase(caminho, payloadPixString);
                    exibirQRCode(payloadPixString);
                }
            });
        }

        function salvarDadosFirebase(caminho, chavePix) {
            // Implementação para salvar os dados no Firebase
            var database = firebase.database();
            database.ref(caminho).set(chavePix);
        }

        function exibirQRCode(chavePix) {
            document.getElementById("formContent").style.display = "none";
            document.getElementById("qrCodeContent").style.display = "block";

            new QRCode(document.getElementById("qrcode"), {
                text: chavePix,
                width: 128,
                height: 128
            });

            document.getElementById("qrCodeText").value = chavePix;
        }

        function copiarCodigo() {
            var qrCodeText = document.getElementById("qrCodeText");
            qrCodeText.select();
            document.execCommand("copy");
            alert("Código copiado com sucesso!");
        }
    </script>
</body>
</html>
