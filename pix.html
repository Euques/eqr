<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento PIX</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div id="qrCodeContent" style="display:none;">
            <div id="qrcode"></div>
            <input type="text" id="qrCodeText" class="form-control" readonly>
            <button onclick="copiarCodigo()" class="btn btn-primary mt-2">Copiar Código</button>
        </div>
        <div id="formContent" style="display:block;">
            <h2>Pagamento PIX</h2>
            <div class="divOpcao d-none url-option d-block">
                <div class="box-pix input-group flex-column" id="tipo-chave-container">
                    <label class="pix-label" for="tipo-chave">Tipo de chave:<span class="ml-1" style="color:red">*</span></label>
                    <div class="form-group input-group-prepend">
                        <select class="input-form" id="tipo-chave" name="tipo-chave" data-required="true" required="">
                            <option value="cpf">CPF</option>
                            <option value="cnpj">CNPJ</option>
                            <option value="email">E-mail</option>
                            <option value="telefone">Telefone</option>
                            <option value="aleatoria">Chave aleatória</option>
                        </select>
                        <input id="valor-chave" name="valor-chave" class="input-form" aria-label="Text input with dropdown button" data-required="true" required="" autocomplete="off" placeholder="(11) 99999-9999" maxlength="15">
                    </div>
                </div>
                <div class="form-group pix-container mt-3">
                    <div>
                        <div class="box-pix">
                            <div class="form-group">
                                <label class="pix-label" for="nome-beneficiario">Nome do beneficiário:<span class="ml-1" style="color:red">*</span></label>
                                <input id="nome-beneficiario" name="nome-beneficiario" class="input-form" data-required="true" required="" maxlength="25">
                            </div>
                        </div>
                    </div>
                    <div>
                        <div class="box-pix">
                            <div class="form-group">
                                <label class="pix-label" for="cidade-beneficiario">Cidade do beneficiário:<span class="ml-1" style="color:red">*</span></label>
                                <input id="cidade-beneficiario" name="cidade-beneficiario" class="input-form" data-required="true" required="" maxlength="15">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="box-pix">
                            <label class="pix-label" for="valor-transferencia">Valor da transferência:</label>
                            <div class="input-group valor-pix mb-3">
                                <div class="input-group-prepend">
                                    <span class="input-group-text" id="basic-addon1">R$</span>
                                </div>
                                <input id="valor-transferencia" name="valor-transferencia" class="input-form valores" placeholder="0,00" aria-label="transferencia" aria-describedby="basic-addon1">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="box-pix">
                            <div class="form-group">
                                <label class="pix-label" for="identificador-transacao">Identificador da transação:</label>
                                <input id="identificador-transacao" name="identificador-transacao" class="input-form" pattern="[A-Za-z0-9]+" title="O identificador não pode ter caracteres especiais nem espaços" maxlength="25">
                                <p class="small mb-0 mt-1"><i>Sem espaços e/ou caracteres especiais (ex: ç ã)</i></p>
                            </div>
                        </div>
                    </div>
                </div>
                <button onclick="gerarPIX()" class="btn btn-primary mt-2">Gerar PIX</button>
            </div>
        </div>
    </div>

    <script>
        function gerarPIX() {
            var tipoChave = document.getElementById('tipo-chave').value;
            var valorChave = document.getElementById('valor-chave').value;
            var nomeBeneficiario = document.getElementById('nome-beneficiario').value;
            var cidadeBeneficiario = document.getElementById('cidade-beneficiario').value;
            var valorTransferencia = document.getElementById('valor-transferencia').value;
            var identificadorTransacao = document.getElementById('identificador-transacao').value;

            // Verifica se os campos obrigatórios estão preenchidos
            if (!tipoChave || !valorChave || !nomeBeneficiario || !cidadeBeneficiario || !valorTransferencia || !identificadorTransacao) {
                alert("Por favor, preencha todos os campos obrigatórios.");
                return;
            }

            // Monta a chave PIX com base nas informações fornecidas
            var chavePix = tipoChave.toUpperCase() + ":" + valorChave;

            // Obtém o valor associado à chave PIX, se existir (você deve implementar essa parte)
            var valorPix = obterValorPix(chavePix);

            // Se o valor existir, use-o para exibir o QR Code
            if (valorPix !== null) {
                var payloadPix = {
                    chave: chavePix,
                    nome: nomeBeneficiario,
                    cidade: cidadeBeneficiario,
                    valor: parseFloat(valorPix),
                    id: identificadorTransacao
                };
                exibirQRCode(JSON.stringify(payloadPix));
            } else {
                // Caso contrário, mostre uma mensagem de erro
                alert("Chave PIX não encontrada. Por favor, verifique a chave inserida.");
            }
        }

        // Função fictícia para obter o valor associado à chave PIX (você deve implementar essa parte)
        function obterValorPix(chavePix) {
            // Aqui você deve implementar a lógica para buscar o valor associado à chave no seu sistema
            // Por enquanto, essa função retorna null como exemplo
            return null;
        }

        function exibirQRCode(chavePix) {
            document.getElementById("formContent").style.display = "none";
            document.getElementById("qrCodeContent").style.display = "block";

            new QRCode(document.getElementById("qrcode"), {
                text: chavePix,
                width: 128,
                height: 128
            });

            document.getElementById("qrCodeText").value = chavePix;
        }

        function copiarCodigo() {
            var qrCodeText = document.getElementById("qrCodeText");
            qrCodeText.select();
            document.execCommand("copy");
            alert("Código copiado com sucesso!");
        }
    </script>
</body>
</html>
