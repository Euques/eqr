<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de PIX</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://www.gstatic.com/firebasejs/7.14.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/7.14.0/firebase-database.js"></script>
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div id="qrCodeContent" style="display:none;">
            <!-- Exibição do QR Code -->
            <div id="qrcode"></div>
            <input type="text" id="qrCodeText" class="form-control" readonly>
            <button onclick="copiarCodigo()" class="btn btn-primary mt-2">Copiar Código</button>
        </div>
        <div id="formContent" style="display:block;">
            <h2>Gerar PIX</h2>
            <!-- Formulário para inserção de dados -->
            <div class="divOpcao d-none url-option d-block">
                <div class="box-pix input-group flex-column" id="tipo-chave-container">
                    <label class="pix-label" for="tipo-chave">Tipo de chave:<span class="ml-1" style="color:red">*</span></label>
                    <div class="form-group input-group-prepend">
                        <select class="input-form" id="tipo-chave" name="tipo-chave" data-required="true" required="" data-selected="cpf">
                            <option value="cpf" selected="">CPF</option>
                            <option value="cnpj">CNPJ</option>
                            <option value="email">E-mail</option>
                            <option value="telefone">Telefone</option>
                            <option value="aleatoria">Chave aleatória</option>
                        </select>
                        <input id="valor-chave" name="valor-chave" class="input-form" aria-label="Text input with dropdown button" data-required="true" required="" autocomplete="off" placeholder="(11) 99999-9999" maxlength="15">
                    </div>
                </div>
                <div class="form-group pix-container mt-3">
                    <div>
                        <div class="box-pix">
                            <div class="form-group">
                                <label class="pix-label" for="nome-beneficiario">Nome do beneficiário:<span class="ml-1" style="color:red">*</span></label>
                                <input id="nome-beneficiario" name="nome-beneficiario" class="input-form" data-required="true" required="" maxlength="25">
                            </div>
                        </div>
                    </div>
                    <div>
                        <div class="box-pix">
                            <div class="form-group">
                                <label class="pix-label" for="cidade-beneficiario">Cidade do beneficiário:<span class="ml-1" style="color:red">*</span></label>
                                <input id="cidade-beneficiario" name="cidade-beneficiario" class="input-form" data-required="true" required="" maxlength="15">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="box-pix">
                            <label class="pix-label" for="valor-transferencia">Valor da transferência:</label>
                            <div class="input-group valor-pix mb-3">
                                <div class="input-group-prepend"><span class="input-group-text" id="basic-addon1">R$</span></div>
                                <input id="valor-transferencia" name="valor-transferencia" class="input-form valores" placeholder="0,00" aria-label="transferencia" aria-describedby="basic-addon1">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="box-pix">
                            <div class="form-group">
                                <label class="pix-label" for="identificador-transacao">Identificador da transação:</label>
                                <input id="identificador-transacao" name="identificador-transacao" class="input-form" pattern="[A-Za-z0-9]+" title="O identificador não pode ter caracteres especiais nem espaços" maxlength="25">
                                <p class="small mb-0 mt-1"><i>Sem espaços e/ou caracteres especiais (ex: ç ã)</i></p>
                            </div>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="grid-position imprimir-pix" id="imprimir-pix" style="display:none">
                        <div class="box-pix">
                            <div class="form-group">
                                <button id="PixGerarPDFButton" class="btn btn-block btn-outline-primary"><i class="bi bi-printer mr-2"></i>Imprimir plaquinha pix</button>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3 grid-position comprar-plaquinha-pix" id="comprar-plaquinha-pix" style="display:none">
                        <div class="box-pix">
                            <div class="form-group text-center">
                                <a class="btn btn-block btn-outline-secondary" target="_blank" href="https://www.amazon.com.br/gp/search?ie=UTF8&amp;tag=qrplus-20&amp;linkCode=ur2&amp;linkId=507abfa01c9bba8b6eb06a86c92593bb&amp;camp=1789&amp;creative=9325&amp;index=aps&amp;keywords=display%20acr%C3%ADlico%20a5"><i class="bi bi-cart-check mr-2"></i><span>Comprar placa de acrílico na Amazon</span></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <button onclick="gerarPIX()" class="btn btn-primary mt-2">Gerar PIX</button>
        </div>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyD9w-BMC-4WrQppa6VnOCrszo4QMIyROXU",
            authDomain: "euques-teste.firebaseapp.com",
            databaseURL: "https://euques-teste-default-rtdb.firebaseio.com",
            projectId: "euques-teste",
            storageBucket: "euques-teste.appspot.com",
            messagingSenderId: "48182046778",
            appId: "1:48182046778:web:4cd6f3b08cae7f6588c503",
            measurementId: "G-KQXMBG1EXG"
        };
        firebase.initializeApp(firebaseConfig);

        function gerarPIX() {
            var tipoChave = document.getElementById('tipo-chave').value;
            var valorChave = document.getElementById('valor-chave').value;
            var nomeBeneficiario = document.getElementById('nome-beneficiario').value;
            var cidadeBeneficiario = document.getElementById('cidade-beneficiario').value;
            var valorTransferencia = document.getElementById('valor-transferencia').value;
            var identificadorTransacao = document.getElementById('identificador-transacao').value;

            // Adicione a lógica para gerar o PIX com os dados acima
            var chavePix = gerarChavePix(tipoChave, valorChave);
            var pixData = {
                tipoChave: tipoChave,
                valorChave: valorChave,
                nomeBeneficiario: nomeBeneficiario,
                cidadeBeneficiario: cidadeBeneficiario,
                valorTransferencia: valorTransferencia,
                identificadorTransacao: identificadorTransacao,
                chavePix: chavePix
            };

            // Salvar dados do PIX no Firebase (substitua pela lógica de sua preferência)
            var database = firebase.database();
            var chave = database.ref('pix').push().key;
            var updates = {};
            updates['/pix/' + chave] = pixData;
            database.ref().update(updates);

            // Gerar e exibir o QR Code com base na chave PIX
            exibirQRCode(chavePix);
        }

        function exibirQRCode(chavePix) {
            document.getElementById("formContent").style.display = "none";
            document.getElementById("qrCodeContent").style.display = "block";

            // Gerar o QR Code a partir do valor da chave PIX
            var qrcode = new QRCode(document.getElementById("qrcode"), {
                text: chavePix,
                width: 128,
                height: 128
            });

            document.getElementById("qrCodeText").value = chavePix;
        }

        function copiarCodigo() {
            var qrCodeText = document.getElementById("qrCodeText");
            qrCodeText.select();
            document.execCommand("copy");
            alert("Código copiado com sucesso!");
        }

        // Função para gerar a chave PIX com base no tipo e valor da chave
        function gerarChavePix(tipoChave, valorChave) {
            if (tipoChave === "cpf") {
                return "CPF:" + valorChave;
            } else if (tipoChave === "cnpj") {
                return "CNPJ:" + valorChave;
            } else if (tipoChave === "email") {
                return valorChave;
            } else if (tipoChave === "telefone") {
                return "TEL:" + valorChave;
            } else if (tipoChave === "aleatoria") {
                return Math.random().toString(36).substring(2, 12);
            } else {
                return "";
            }
        }

        window.onload = function () {
            // Adicione qualquer inicialização adicional que você possa precisar aqui
        };
    </script>
</body>
</html>
