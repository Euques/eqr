<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de QR Code</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/7.14.0/firebase-app.js"></script>
    <!-- Firebase Authentication -->
    <script src="https://www.gstatic.com/firebasejs/7.14.0/firebase-auth.js"></script>
    <!-- Firebase Database -->
    <script src="https://www.gstatic.com/firebasejs/7.14.0/firebase-database.js"></script>
    <style>
        body { padding-top: 20px; }
        .container { max-width: 600px; margin: auto; }
        .resultado {
            border: 1px solid #007bff;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            background-color: #f1f1f1;
        }
        .resultado h5 {
            color: #007bff;
            margin-bottom: 0;
        }
        .resultado p {
            margin-top: 5px;
            color: #333;
        }
        .btn-success {
            margin-top: 10px;
        }
        .footer {
            padding: 20px 0;
            background-color: #f8f9fa;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="scanner-content">
            <h2>Leitor de QR Code</h2>
            <div id="key-info" class="resultado">
                <h5>Nome da Chave (c): <span id="key-name"></span></h5>
                <p>Valor da Chave: <span id="key-value"></span></p>
                <button id="edit-button" class="btn btn-primary" style="display: none;" onclick="showEditableContent()">Editar</button>
                <button id="insert-edit-button" class="btn btn-primary" style="display: none;" onclick="showInsertEditInfo()">Inserir/Editar Valor</button>
            </div>
            <hr> <!-- Linha divisória -->
            <div id="data" class="resultado"></div>
            <div id="insert-edit-info" style="display: none;">
                <h5>Inserir/Editar Informação:</h5>
                <textarea id="insert-edit-textbox-value" class="form-control" rows="4" placeholder="Insira/edita um valor para a chave 'data'"></textarea>
                <button onclick="insertEditData()" class="btn btn-success">Salvar</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p id="user-info"></p>
        </div>
    </footer>

    <script>
        // Configuração do Firebase com suas credenciais
        var firebaseConfig = {
            apiKey: "AIzaSyD9w-BMC-4WrQppa6VnOCrszo4QMIyROXU",
            authDomain: "euques-teste.firebaseapp.com",
            databaseURL: "https://euques-teste-default-rtdb.firebaseio.com",
            projectId: "euques-teste",
            storageBucket: "euques-teste.appspot.com",
            messagingSenderId: "48182046778",
            appId: "1:48182046778:web:4cd6f3b08cae7f6588c503",
            measurementId: "G-KQXMBG1EXG"
        };
        firebase.initializeApp(firebaseConfig);

        // Função para autenticar com o Google
        function signInWithGoogle() {
            var provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then(function(result) {
                var user = result.user;
                showAuthenticatedContent(user);
            }).catch(function(error) {
                console.error(error);
            });
        }

        // Função para exibir campo de inserção/editar informação
        function showInsertEditInfo() {
            document.getElementById('scanner-content').style.display = 'none';
            document.getElementById('edit-button').style.display = 'none';
            document.getElementById('insert-edit-info').style.display = 'block';
        }

        // Função para inserir/editar um valor na chave 'data'
        function insertEditData() {
            var content = getParameterValue();
            var value = document.getElementById('insert-edit-textbox-value').value;
            var keyRef = firebase.database().ref('eqr/' + content + '/data');
            keyRef.set(value).then(() => {
                alert('Valor inserido/editado com sucesso.');
                window.location.reload();
            });
        }

        // ... (código anterior)

        // Verificar a autenticação do usuário e mostrar conteúdo correspondente
        firebase.auth().onAuthStateChanged(function(user) {
            if (user) {
                showAuthenticatedContent(user);
            } else {
                // Se não estiver autenticado, redirecione para a página de login
                window.location.href = 'login.html';
            }
        });

        // Ao carregar a página, verifica se a chave existe e exibe o conteúdo apropriado
        createKeyIfNotExists();
    </script>
</body>
</html>
