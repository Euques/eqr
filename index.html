<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Example</title>
    <!-- Adicione a biblioteca do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-database.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        .input-container {
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 100px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Firebase Realtime Database</h2>

    <div class="input-container">
        <label for="key">Chave:</label>
        <div id="key"></div>
    </div>

    <div class="input-container">
        <label for="value">Valor:</label>
        <textarea id="value" placeholder="Digite o valor..."></textarea>
    </div>

    <button onclick="salvarNoFirebase()">Salvar/Editar</button>
</div>

<script>
    // Configuração do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyD9w-BMC-4WrQppa6VnOCrszo4QMIyROXU",
        authDomain: "euques-teste.firebaseapp.com",
        databaseURL: "https://euques-teste-default-rtdb.firebaseio.com",
        projectId: "euques-teste",
        storageBucket: "euques-teste.appspot.com",
        messagingSenderId: "48182046778",
        appId: "1:48182046778:web:4cd6f3b08cae7f6588c503",
        measurementId: "G-KQXMBG1EXG"
    };

    // Inicialize o Firebase
    firebase.initializeApp(firebaseConfig);

    // Referência ao nó no Realtime Database
    const database = firebase.database();
    const chave = obterParametroDaURL('c');
    const valorInput = document.getElementById('value');
    const chaveDiv = document.getElementById('key');

    // Carregar valor existente, se houver
    carregarValorExistente();

    function carregarValorExistente() {
        const referencia = database.ref(`eqr/${chave}/data`);

        referencia.once('value').then((snapshot) => {
            const valor = snapshot.val();
            chaveDiv.textContent = `Chave: ${chave}`;
            valorInput.value = valor || '';
        });
    }

    function salvarNoFirebase() {
        const valor = valorInput.value;
        const referencia = database.ref(`eqr/${chave}/data`);

        referencia.set(valor).then(() => {
            alert('Valor salvo com sucesso!');
        }).catch((error) => {
            console.error('Erro ao salvar no Firebase:', error);
            alert('Erro ao salvar. Verifique o console para mais detalhes.');
        });
    }

    // Função para obter parâmetros da URL
    function obterParametroDaURL(nome) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(nome);
    }
</script>

</body>
</html>
