<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leitor de QR Code</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <script src="https://www.gstatic.com/firebasejs/7.14.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.14.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.14.0/firebase-auth.js"></script>
  <style>
  body {
    padding-top: 20px;
  }
  .container {
    max-width: 600px;
    margin: auto;
  }
  .resultado {
    border: 1px solid #007bff;
    padding: 15px;
    border-radius: 5px;
    margin-top: 15px;
    background-color: #f1f1f1;
  }
  .resultado h5 {
    color: #007bff;
    margin-bottom: 0;
  }
  .resultado p {
    margin-top: 5px;
    color: #333;
  }
  .btn-success {
    margin-top: 10px;
  }
  </style>
</head>
<body>
  <div class="container">
    <div id="login-content" style="display: none;">
      <h2>Login</h2>
      <input type="email" id="email" class="form-control" placeholder="E-mail">
      <input type="password" id="password" class="form-control" placeholder="Senha">
      <button onclick="login()">Login</button>
    </div>
    <div id="scanner-content" style="display: none;">
      <h2>Leitor de QR Code</h2>
      <div id="data" class="resultado"></div>
    </div>
  </div>
  <script>
  var firebaseConfig = {
    apiKey: "AIzaSyD9w-BMC-4WrQppa6VnOCrszo4QMIyROXU",
    authDomain: "euques-teste.firebaseapp.com",
    databaseURL: "https://euques-teste-default-rtdb.firebaseio.com",
    projectId: "euques-teste",
    storageBucket: "euques-teste.appspot.com",
    messagingSenderId: "48182046778",
    appId: "1:48182046778:web:4cd6f3b08cae7f6588c503",
    measurementId: "G-KQXMBG1EXG"
  };
  firebase.initializeApp(firebaseConfig);

  function login() {
    var email = document.getElementById('email').value;
    var password = document.getElementById('password').value;

    firebase.auth().signInWithEmailAndPassword(email, password).then(() => {
      window.location.href = '/';
    }, (error) => {
      alert(error.message);
    });
  }

  function getParameterValue() {
    const params = new URLSearchParams(window.location.search);
    return params.get('c');
  }

  const content = getParameterValue();

  // Verifica se o código QR está presente
  if (!content) {
    // Exibe o formulário de login
    document.getElementById('login-content').style.display = 'block';
  } else {
  // Verifica se o usuário está logado
  if (firebase.auth().currentUser) {
    // Exibe o campo de edição
    document.getElementById('edit-value').style.display = 'block';
  } else {
    // Exibe o formulário de login
    document.getElementById('login-content').style.display = 'block';
  }
}

// Funções

function createKeyAndReload() {
  // Cria um novo nó na base de dados
  var keyRef = firebase.database().ref('codeqr');
  keyRef.push({
    valor: 'Novo valor'
  });

  // Recarrega a página
  window.location.reload();
}

function edit() {
  // Verifica se o usuário está logado
  if (!firebase.auth().currentUser) {
    alert('Você precisa estar logado para editar o valor deste código QR.');
    return;
  }

  // Obtém o valor do código QR
  var value = document.getElementById('edit-value').value;

  // Atualiza o valor no banco de dados
  var keyRef = firebase.database().ref('codeqr/' + firebase.auth().currentUser.uid + '/' + content);
  keyRef.child('valor').set(value);

  // Exibe uma mensagem de sucesso
  alert('O valor foi atualizado com sucesso.');
}

function copyValue() {
  // Verifica se o usuário está logado
  if (!firebase.auth().currentUser) {
    alert('Você precisa estar logado para copiar o valor deste código QR.');
    return;
  }

  // Obtém o valor do código QR
  var value = document.getElementById('value').textContent;

  // Cria um elemento de entrada
  var input = document.createElement('input');
  input.value = value;
  input.type = 'text';
  input.focus();
  input.select();
  document.body.appendChild(input);
  document.execCommand('copy');
  document.body.removeChild(input);

  // Exibe uma mensagem de sucesso
  alert('O valor foi copiado para a área de transferência.');
}



  </script>
</body>
</html>
