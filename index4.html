<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leitor de QR Code</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <script src="https://www.gstatic.com/firebasejs/7.14.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.14.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/7.14.0/firebase-auth.js"></script>
  <style>
    body {
      padding-top: 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
    }
    .resultado {
      border: 1px solid #007bff;
      padding: 15px;
      border-radius: 5px;
      margin-top: 15px;
      background-color: #f1f1f1;
    }
    .resultado h5 {
      color: #007bff;
      margin-bottom: 0;
    }
    .resultado p {
      margin-top: 5px;
      color: #333;
    }
    .btn-success {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="login-content">
      <h2>Login</h2>
      <input type="email" id="email" class="form-control" placeholder="E-mail">
      <input type="password" id="password" class="form-control" placeholder="Senha">
      <button onclick="login()">Login</button>
    </div>
    <div id="scanner-content" style="display: none;">
      <h2>Leitor de QR Code</h2>
      <div id="data" class="resultado"></div>
    </div>
  </div>
  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyD9w-BMC-4WrQppa6VnOCrszo4QMIyROXU",
      authDomain: "euques-teste.firebaseapp.com",
      databaseURL: "https://euques-teste-default-rtdb.firebaseio.com",
      projectId: "euques-teste",
      storageBucket: "euques-teste.appspot.com",
      messagingSenderId: "48182046778",
      appId: "1:48182046778:web:4cd6f3b08cae7f6588c503",
      measurementId: "G-KQXMBG1EXG"
    };
    firebase.initializeApp(firebaseConfig);

    // Função para verificar a existência da chave 'valor' no Realtime Database
    function checkValueExistence() {
      const params = new URLSearchParams(window.location.search);
      const cValue = params.get('c');

      if (cValue) {
        var keyRef = firebase.database().ref('codeqr/' + cValue + '/valor');
        keyRef.once('value').then(function(snapshot) {
          var value = snapshot.val();
          if (value !== null && value !== undefined) {
            // Se a chave 'valor' existir, mostre o resultado
            document.getElementById('data').innerHTML = '<h5>Resultado</h5><p>Valor existe: ' + value + '</p>';
            document.getElementById('scanner-content').style.display = 'block';
            document.getElementById('login-content').style.display = 'none';
          } else {
            // Se a chave 'valor' não existir, mostre a tela de login
            document.getElementById('scanner-content').style.display = 'none';
            document.getElementById('login-content').style.display = 'block';
          }
        });
      } else {
        // Se c não estiver definido, mostre a tela de login
        document.getElementById('scanner-content').style.display = 'none';
        document.getElementById('login-content').style.display = 'block';
      }
    }

    function login() {
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;

      firebase.auth().signInWithEmailAndPassword(email, password).then(() => {
        window.location.href = '/';
      }).catch(function(error) {
        alert("Erro de login: " + error.message);
      });
    }

    // Verifique a existência da chave 'valor' quando a página é carregada
    window.onload = checkValueExistence;
  </script>
</body>
</html>
