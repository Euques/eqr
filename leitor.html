<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Leitor de QR Code</title>

    <style>
        body {
            background-color: #000;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        #reader-container {
            max-width: 600px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 15px;
        }

        #reader {
            width: 100%;
            height: auto;
            border-radius: 15px;
            transform: scaleX(-1); /* Inverter o espelhamento horizontal */
        }

        #overlay-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #btnVoltar {
            display: block;
            margin: 20px auto;
            padding: 10px;
            width: 80%;
            max-width: 400px;
            text-align: center;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div id="reader-container">
    <div id="overlay-text">Ler E-QR</div>
    <video id="reader"></video>
</div>
<a href="#" id="btnVoltar">Voltar</a>

<!-- Instascan JS -->
<script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>

<!-- Your custom script -->
<script>
    const video = document.getElementById("reader");
    const overlayText = document.getElementById("overlay-text");

    const scanner = new Instascan.Scanner({ video: video, mirror: false });

    Instascan.Camera.getCameras().then(function (cameras) {
        if (cameras.length > 0) {
            // Use a câmera traseira
            const rearCamera = cameras.find(camera => camera.name.toLowerCase().includes("back"));
            
            if (rearCamera) {
                scanner.addListener("scan", function (content) {
                    alert("QR code lido com sucesso. Redirecionando para: " + content);
                    window.location.href = content;
                });

                scanner.start(rearCamera);
            } else {
                console.error("No rear camera found.");
            }
        } else {
            console.error("No cameras found.");
        }
    }).catch(function (e) {
        console.error(e);
    });

    document.getElementById("btnVoltar").addEventListener("click", function () {
        window.history.back();
    });
</script>

</body>
</html>
